<svg>
  <rect
    *ngFor="let point of data; index as i"
    [attr.x]="i * svgDimensions.width + 0.5 * columnPadding.padding + columnPadding.outerPadding"
    [attr.y]="innerHeight - (innerHeight / svgDimensions.maxHeight) * point"
    [attr.width]="columnPadding.bandwidth"
    [attr.height]="(innerHeight / svgDimensions.maxHeight) * point"></rect>
</svg>
